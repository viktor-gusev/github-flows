name: npm publication

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - run: npm test

      # Read package metadata via npm (ESM-safe)
      - name: Read package.json
        id: pkg
        run: |
          NAME=$(npm pkg get name | tr -d '"')
          VERSION=$(npm pkg get version | tr -d '"')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Check release tag matches version
      - name: Check release version
        if: github.event_name == 'release'
        run: |
          RELEASE_TAG='${{ github.event.release.tag_name }}'
          RELEASE_VERSION="${RELEASE_TAG#v}"
          test "${{ steps.pkg.outputs.version }}" = "$RELEASE_VERSION"

      # Check version not already published
      - name: Check version not published
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version already published"
            exit 1
          fi

      # Inspect package
      - run: npm pack --dry-run

      # Publish
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
